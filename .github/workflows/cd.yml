# ═══════════════════════════════════════════════════════════════════════════════
# CD — Déploiement automatique sur GCP Cloud Run
#
# Architecture gratuite :
# ────────────────────────
# Le BUILD Docker se fait dans Google Cloud Build (120 min/jour GRATUITS sur GCP)
# GitHub Actions ne fait qu'authentifier et déclencher → ~2 min de runner max.
# → 0 coût GitHub Actions pour l'organisation.
#
# Flux complet :
#   git push main
#        ↓
#   GitHub Actions (2 min) : auth GCP + gcloud builds submit
#        ↓
#   Cloud Build (GCP, gratuit) : build backend + frontend + deploy Cloud Run
#        ↓
#   Production mise à jour automatiquement
# ═══════════════════════════════════════════════════════════════════════════════

name: CD — Déploiement GCP Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'production'
        type: choice
        options: [ production, staging ]

env:
  GCP_PROJECT: homepedia-493013
  GCP_REGION: europe-west1

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB UNIQUE : Déléguer à Cloud Build (gratuit GCP)
  # GitHub runner utilisé ~2 min max → pas de coût GitHub Actions
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-cloud-build:
    name: 🚀 Trigger Cloud Build (GCP free tier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authentification GCP avec la clé de service
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # Installer gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      # Lancer le build dans Cloud Build (pas sur GitHub runner)
      # Le source code est uploadé sur GCS, le build se passe entièrement dans GCP
      # → 120 min/jour gratuits, aucune minute GitHub consommée pour le build
      - name: Submit build to Cloud Build
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --region ${{ env.GCP_REGION }} \
            --substitutions COMMIT_SHA=${{ github.sha }} \
            --project ${{ env.GCP_PROJECT }}

      # Afficher les URLs finales
      - name: Print deployment URLs
        if: success()
        run: |
          BACKEND=$(gcloud run services describe homepedia-backend \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)' 2>/dev/null || echo "N/A")
          FRONTEND=$(gcloud run services describe homepedia-frontend \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)' 2>/dev/null || echo "N/A")
          echo "═══════════════════════════════════════"
          echo "  ✅ DÉPLOIEMENT TERMINÉ"
          echo "  Backend  : $BACKEND"
          echo "  Frontend : $FRONTEND"
          echo "═══════════════════════════════════════"
