# ═══════════════════════════════════════════════════════════════════════════════
# Pipeline Qualité des données — s'exécute chaque nuit à 6h UTC
#
# Pourquoi un pipeline séparé pour la qualité ?
# ───────────────────────────────────────────────
# Les données peuvent se dégrader SANS que le code change.
# Ex : DVF ajoute des lignes avec des coordonnées nulles,
#      ImmoData renvoie des prix aberrants, etc.
#
# Ce pipeline vérifie chaque matin que les données sont saines.
# Si des anomalies sont détectées → email à Ludo.
# ═══════════════════════════════════════════════════════════════════════════════

name: Qualité données — Vérification nocturne

on:
  schedule:
    - cron: '0 6 * * 1'   # chaque lundi à 6h UTC — hebdomadaire (économise les minutes Actions)
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  data-quality-check:
    name: 🔍 Vérification qualité données
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # dbt-bigquery et great-expectations pèsent plusieurs minutes d'installation
      # et ne servent qu'à l'étape dbt, elle-même conditionnelle. Ils sont donc
      # installés là où ils servent : le contrôle des données n'a besoin que de
      # psycopg2, et la facture d'un runner se compte en minutes.
      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # ── Biais de présentation ─────────────────────────────────────────────
      # Contrôle distinct des vérifications d'intégrité ci-dessous : il ne
      # cherche pas des valeurs manquantes ou aberrantes, mais des données
      # exactes publiées avec plus d'assurance qu'elles n'en méritent — un
      # pourcentage calculé sur trois diagnostics, une estimation présentée
      # comme une observation. Il croise aussi nos estimations de loyer avec
      # les barèmes préfectoraux, seul moyen d'avoir détecté qu'elles étaient
      # basses de 12 à 24 % dans les communes populaires.
      #
      # Volontairement sans « || true » : c'est la seule étape dont l'échec
      # doit se voir.
      - name: Contrôle des biais de présentation
        run: python scripts/controle_donnees.py --verbeux
        env:
          POSTGRES_HOST: aws-0-eu-west-1.pooler.supabase.com
          POSTGRES_PORT: "5432"
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres.iugsfmvqddburvufzacy
          POSTGRES_SSLMODE: require
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # ── Vérifications PostgreSQL ──────────────────────────────────────────
      - name: Check PostgreSQL data quality
        id: pg-check
        run: python .github/scripts/check_postgres.py || true
        env:
          POSTGRES_HOST: aws-0-eu-west-1.pooler.supabase.com
          POSTGRES_PORT: "5432"
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres.iugsfmvqddburvufzacy
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # ── Tests DBT ─────────────────────────────────────────────────────────
      - name: Run DBT tests
        if: ${{ hashFiles('homepedia_dbt/**') != '' }}
        working-directory: ./homepedia_dbt
        run: |
          pip install dbt-bigquery great-expectations
          dbt test --profiles-dir ~/.dbt || true

      # ── Notification si échec — GitHub Issue (pas besoin de SMTP) ────────
      - name: Notify on failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['data-quality-alert'],
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[HomePedia] Anomalie qualité données — ${new Date().toLocaleDateString('fr-FR')}`,
                body: `Une anomalie a été détectée dans le pipeline qualité données.\n\nVoir les logs : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-quality-alert']
              });
            }
