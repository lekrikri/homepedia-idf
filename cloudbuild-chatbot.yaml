# Pipeline dédié au rebuild du chatbot (llama-cpp + Qwen2.5-0.5B ~500MB)
# Déclencher MANUELLEMENT quand chatbot/ est modifié :
#   gcloud builds submit --config cloudbuild-chatbot.yaml .
# Nécessite une machine puissante (E2_HIGHCPU_8) pour compiler llama-cpp sans OOM.

substitutions:
  _REGION: europe-west1
  _REGISTRY: europe-west1-docker.pkg.dev/homepedia-493013/homepedia
  _CHATBOT_SERVICE: homepedia-chat

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8  # 8 vCPUs pour compiler llama-cpp sans OOM

timeout: 2400s  # 40 min max (compile + download modèle + push)

steps:
  # HuggingFace bloque les connexions TLS depuis les IPs GCP → modèles stockés dans GCS
  - name: gcr.io/cloud-builders/gsutil
    id: download-qwen
    args:
      - cp
      - gs://homepedia-datalake/models/qwen2.5-0.5b-instruct-q4_k_m.gguf
      - ./chatbot/models/qwen2.5-0.5b.gguf

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: download-minilm
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p ./chatbot/models/minilm
        gsutil -m cp -r gs://homepedia-datalake/models/minilm/* ./chatbot/models/minilm/

  - name: gcr.io/cloud-builders/docker
    id: build-chatbot
    args:
      - build
      - -t
      - ${_REGISTRY}/chat:latest
      - --cache-from
      - ${_REGISTRY}/chat:latest
      - ./chatbot
    waitFor: [download-qwen, download-minilm]

  - name: gcr.io/cloud-builders/docker
    id: push-chatbot
    args: [push, "${_REGISTRY}/chat:latest"]
    waitFor: [build-chatbot]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-chatbot
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_CHATBOT_SERVICE}
      - --image=${_REGISTRY}/chat:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=4Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=2
      - --set-env-vars=POSTGRES_HOST=aws-0-eu-west-1.pooler.supabase.com,POSTGRES_PORT=6543,POSTGRES_DB=postgres,POSTGRES_USER=postgres.iugsfmvqddburvufzacy,POSTGRES_SSLMODE=require,DISABLE_LLM=false,REDIS_URL=redis://default:AacfAAIgcDEzZjI1NWIxMTg2Yzc0MzI5YmEyYmM0MDg0MzE4Mzc3Yw@flying-vulture-42783.upstash.io:6379
      - --update-secrets=POSTGRES_PASSWORD=homepedia-supabase-password:latest
      - --quiet
    waitFor: [push-chatbot]

images:
  - ${_REGISTRY}/chat:latest

