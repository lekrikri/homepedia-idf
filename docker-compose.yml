services:
  postgres:
    # Image PostGIS + pgvector (extension vectorielle pour le chatbot RAG)
    build:
      context: ./backend/db
      dockerfile: Dockerfile
    container_name: homepedia_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/migrations/007_rag_pgvector.sql:/docker-entrypoint-initdb.d/02_rag_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: homepedia_redis
    # Pas de port publié sur l'hôte : accès uniquement via le réseau Docker
    # (évite les conflits avec d'autres Redis locaux sur 6379)
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: homepedia_chromadb
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepedia_backend
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Postgres local en Docker : pas de TLS (Supabase prod = require)
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      MONGODB_URI: ${MONGODB_URI}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      CHROMADB_HOST: ${CHROMADB_HOST}
      CHROMADB_PORT: ${CHROMADB_PORT}
      JWT_SECRET: ${JWT_SECRET}
      # Proxy vers le service RAG Python (chatbot)
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://rag:8002}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  # Service RAG (FastAPI) — chatbot immobilier. Retrieval pgvector + LLM Ollama.
  rag:
    build:
      context: ./rag
      dockerfile: Dockerfile
    container_name: homepedia_rag
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Ollama tourne sur la machine hôte (modèles locaux CPU/GPU)
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_REWRITE_MODEL: ${OLLAMA_REWRITE_MODEL:-qwen2.5:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    ports:
      - "8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homepedia_frontend
    env_file: .env
    ports:
      # nginx écoute sur 8080 dans l'image (compat Cloud Run)
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
